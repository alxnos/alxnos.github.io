<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alxnos | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #00ff88;
            margin-bottom: 10px;
        }
        p {
            color: #b3b3b3;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #00ff88;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #00cc6a;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, I'm Alxnos.</h1>
        <p>Welcome to my new website! I am currently building this page using GitHub Pages. Check back soon for more updates and projects.</p>
        <a href="#" class="btn">Get in Touch</a>
    </div>

</body>
</html>
